name: Migrate database

# Apply pending Prisma migrations to Neon without running a full crawl.
# Run this after merging schema changes and BEFORE promoting the deploy that
# depends on them (e.g. the accounts tables). Requires the DATABASE_URL secret.

on:
  workflow_dispatch:
    inputs:
      resolve_rolled_back:
        description: "Name of a failed migration to mark rolled-back before deploy (P3009 recovery). Blank = skip."
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Apply migrations
        env:
          POOLED_URL: ${{ secrets.DATABASE_URL }}
          RESOLVE: ${{ inputs.resolve_rolled_back }}
        run: |
          set -euo pipefail
          # Run migrations over the DIRECT (non-pooled) endpoint. Neon's pooler
          # leaks Prisma's migration advisory lock across the pool (a finished
          # command's server session lingers still holding it), so the next
          # command times out with P1002. The direct endpoint releases the lock
          # the moment the process exits. Derive it by stripping "-pooler".
          export DATABASE_URL="${POOLED_URL/-pooler/}"
          echo "Using direct endpoint: $(echo "$DATABASE_URL" | sed -E 's#(://)[^@]*@#\1***@#')"
          # Recover from a P3009 (a migration left in a failed state, e.g. by a
          # cancelled run): mark it rolled-back so deploy re-applies it cleanly.
          if [ -n "${RESOLVE:-}" ]; then
            echo "Resolving failed migration as rolled-back: $RESOLVE"
            npx prisma migrate resolve --rolled-back "$RESOLVE"
          fi
          npx prisma migrate deploy
          npx prisma migrate status
