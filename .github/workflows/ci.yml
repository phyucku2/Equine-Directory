name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  web:
    name: Web build & lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: equine_directory
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: web
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/equine_directory
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run build

  crawler:
    name: Crawler grading tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crawler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pydantic
      - run: python tests/test_grading.py
