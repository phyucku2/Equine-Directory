name: Crawl listings

# Manual trigger. The crawler can't run from the dev sandbox (egress blocks
# Neon + ohorse), so it runs here, where the runner can reach both.
#
# Prerequisites (repo Settings -> Secrets and variables -> Actions):
#   - DATABASE_URL          (required)        Neon connection string
#   - GOOGLE_MAPS_API_KEY   (for places)      Google Places API key
#   - GEMINI_API_KEY / ANTHROPIC_API_KEY  (optional)  only for LLM grading
#
# The taxonomy (categories + US locations: states & counties) is seeded in the
# target DB by a Vercel deploy (vercel-build runs migrate; seed is run once).

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Source key"
        type: choice
        options: [places, ohorse, fixtures]
        default: places
      state:
        description: "State to crawl (places only) — one batch at a time"
        type: choice
        options:
          - FL
          - AL
          - AR
          - AZ
          - CA
          - CO
          - CT
          - DE
          - GA
          - IA
          - ID
          - IL
          - IN
          - KS
          - KY
          - LA
          - MA
          - MD
          - ME
          - MI
          - MN
          - MO
          - MS
          - MT
          - NC
          - ND
          - NE
          - NH
          - NJ
          - NM
          - NV
          - NY
          - OH
          - OK
          - OR
          - PA
          - RI
          - SC
          - SD
          - TN
          - TX
          - UT
          - VA
          - VT
          - WA
          - WI
          - WV
          - WY
        default: FL
      limit:
        description: "Max listings to pull (10000 = effectively uncapped for one state)"
        type: string
        default: "10000"
      use_llm:
        description: "Use LLM grading (ignored for places; needs an API key secret)"
        type: boolean
        default: false
      seed:
        description: "Seed taxonomy first (OFF for already-seeded states; turn ON when adding a NEW state)"
        type: boolean
        default: false
      deep:
        description: "Deep surgical re-crawl: dense counties only, paginated (~60/search) for true counts"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # deep paginated runs over a state's dense counties take longer
    defaults:
      run:
        working-directory: crawler
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install crawler dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium (ohorse live crawl only)
        if: ${{ inputs.source == 'ohorse' }}
        run: python -m playwright install --with-deps chromium

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Migrations must always run before the crawl (the crawler writes columns/
      # types defined by them, e.g. the widened BusinessImage.url for photo refs).
      - name: Apply DB migrations
        working-directory: web
        env:
          POOLED_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          # Migrations run on the DIRECT (non-pooled) endpoint and clear any
          # leaked Prisma advisory lock first — Neon's pooler can keep a finished
          # migrate's session alive holding pg_advisory_lock(72707369), which
          # makes every later migrate fail with P1002. Same owner-approved
          # mitigation as migrate.yml.
          export DATABASE_URL="${POOLED_URL/-pooler/}"
          npm ci
          npx prisma generate
          printf "%s\n" \
            "SELECT pg_terminate_backend(pid) FROM pg_locks WHERE locktype = 'advisory' AND objid = 72707369 AND pid <> pg_backend_pid();" \
            | npx prisma db execute --stdin --url "$DATABASE_URL" || echo "(no stale lock holders)"
          npx prisma migrate deploy

      - name: Seed taxonomy (categories + US states/counties)
        if: ${{ inputs.seed }}
        working-directory: web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma db seed

      - name: Run crawler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRAWL_STATE: ${{ inputs.state }}
          CRAWL_DEEP: ${{ inputs.deep && '1' || '' }}
          CRAWL_MAX_PAGES: ${{ inputs.deep && '3' || '1' }}
        run: |
          ARGS="--source ${{ inputs.source }} --limit ${{ inputs.limit }}"
          if [ "${{ inputs.use_llm }}" != "true" ]; then
            ARGS="$ARGS --no-llm"
          fi
          echo "Running: python run.py $ARGS"
          python run.py $ARGS
